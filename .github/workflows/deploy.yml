name: Deploy Frontend to Elastic Beanstalk

on:
  push:
    branches:
      - '**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Deployment

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Create deployment package
        run: |
          zip -r deploy.zip dist/*

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload to S3
        run: |
          aws s3 cp deploy.zip s3://${{ secrets.S3_BUCKET_NAME }}/frontend-deploy-${{ github.run_number }}.zip --region ${{ secrets.AWS_REGION }}

      - name: Deploy to Elastic Beanstalk
        id: deploy
        shell: bash
        run: |
          echo "📦 Creating new application version..."
          aws elasticbeanstalk create-application-version \
            --application-name "${{ secrets.EB_APP_NAME_FRONTEND }}" \
            --version-label "v-${{ github.run_number }}" \
            --source-bundle S3Bucket="${{ secrets.S3_BUCKET_NAME }}",S3Key="frontend-deploy-${{ github.run_number }}.zip" \
            --region "${{ secrets.AWS_REGION }}"

          echo "🚀 Updating environment..."
          aws elasticbeanstalk update-environment \
            --environment-name "${{ secrets.EB_ENV_NAME_FRONTEND }}" \
            --version-label "v-${{ github.run_number }}" \
            --region "${{ secrets.AWS_REGION }}"

          echo "🌍 Fetching environment URL..."
          EB_URL=$(aws elasticbeanstalk describe-environments \
            --environment-names "${{ secrets.EB_ENV_NAME_FRONTEND }}" \
            --region "${{ secrets.AWS_REGION }}" \
            --query "Environments[0].CNAME" \
            --output text)

          echo "Deployment completed successfully!"
          echo "Environment URL: http://$EB_URL"
          echo "::set-output name=env_url::http://$EB_URL"


      - name: Print deployment link
        run: echo "🚀 Frontend Live at ${{ steps.deploy.outputs.env_url }}"
